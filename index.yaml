    appVersion: 1.0.0
    created: "2026-05-03T05:53:03.320289628Z"
    description: 'Automatically assigns pod-deletion-cost annotations so that the
      oldest pod is always chosen first during scale-in events.  A CronJob periodically
      sorts Running pods by creation timestamp and sets cost=0 on the oldest, cost+N
      on the next, and so on — making Kubernetes naturally evict oldest-first. '
