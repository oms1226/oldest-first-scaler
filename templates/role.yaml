apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "oldest-first-scaler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oldest-first-scaler.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
