apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "oldest-first-scaler.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oldest-first-scaler.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "oldest-first-scaler.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "oldest-first-scaler.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
